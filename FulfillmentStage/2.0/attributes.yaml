    url: https://beckn.io
components:
  schemas:
    FulfillmentStage:
      x-iri: https://schema.beckn.io/FulfillmentStage/v2.0
      description: Schema definition for FulfillmentStage in the Beckn Protocol v2.0.1
      title: FulfillmentStage
      type: object
      properties:
        id:
          description: A unique identifier for this stage of fulfillment
          type: string
        instructions:
          description: A set of instructions to follow during this stage of fulfillment
          type: array
          items:
            $ref: https://schema.beckn.io/Instruction/v2.0/attributes.yaml#/components/schemas/Instruction
        preferences:
          description: A extensible set of attributes that describe the fulfillment
            preferences
          type: array
          items:
            $ref: https://schema.beckn.io/Attributes/v2.0/attributes.yaml#/components/schemas/Attributes
        start:
          description: An extensible set of attributes that describe the criteria
            required to start this stage of fulfillment
          $ref: https://schema.beckn.io/FulfillmentStageEndpoint/v2.0/attributes.yaml#/components/schemas/FulfillmentStageEndpoint
        end:
          description: An extensible set of attributes that describe the criteria
            required to end this stage of fulfillment
          $ref: https://schema.beckn.io/FulfillmentStageEndpoint/v2.0/attributes.yaml#/components/schemas/FulfillmentStageEndpoint
        fulfillmentStageAttributes:
          description: An extensible set of attributes that describe this stage of
            fulfillment
          $ref: https://schema.beckn.io/Attributes/v2.0/attributes.yaml#/components/schemas/Attributes
      x-jsonld:
        '@id': beckn:fulfillmentStage
      required:
      - id
      additionalProperties: false
      x-tags:
      - common
