openapi: 3.1.1
info:
  title: CatalogPublishResponse
  version: 2.0.0
  description: 'Beckn /beckn/on_catalog_publish message payload. Sent by a CDS back to a BPP

    after processing a catalog publish request. Contains per-catalog processing results

    indicating success, failure, or partial indexing.

    '
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    CatalogPublishResponse:
      x-iri: https://schema.beckn.io/CatalogPublishResponse/v2.0
      title: CatalogPublishResponse
      description: 'Beckn /beckn/on_catalog_publish message payload. Sent by a CDS back to a BPP

        after processing a catalog publish request. Contains per-catalog processing results

        indicating success, failure, or partial indexing.

        '
      x-tags:
      - common
      type: object
      properties:
        context:
          allOf:
          - $ref: https://schema.beckn.io/Context/v2.0/attributes.yaml#/components/schemas/Context
          - type: object
            properties:
              action:
                type: string
                const: beckn/on_catalog_publish
        message:
          type: object
          properties:
            results:
              type: array
              description: Per-catalog processing results from the CDS.
              items:
                $ref: https://schema.beckn.io/CatalogProcessingResult/v2.0/attributes.yaml#/components/schemas/CatalogProcessingResult
      required:
      - context
      - message
