openapi: 3.1.1
info:
  title: RatingInput
  version: 2.1.0
  description: "Container schemas fetched from beckn.yaml. This cannot be extended as it is a reserved schema in beckn protocol. Any additional properties added to this schema can only be made using its *Attributes property"
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    RatingInput:
      x-iri: https://schema.beckn.io/RatingInput/v2.1
      description: A form designed to capture rating and feedback from a user. This
        can be used by both BAP and BPP to fetch ratings and feedback of their respective
        users.
      title: RatingInput
      x-tags:
      - common
      type: object
      properties:
        target:
          description: The thing being rated. It could be a person, an application,
            a service, a product, an instrument used in the fulfillment of the contract,
            or the overall experience.
          type: object
          properties:
            id:
              description: ID of the entity being rated (order/item/fulfillment/provider/agent).
              type: string
            descriptor:
              $ref: https://schema.beckn.io/Descriptor/v2.1/attributes.yaml#/components/schemas/Descriptor
            targetAttributes:
              $ref: https://schema.beckn.io/Attributes/v2.0/attributes.yaml#/components/schemas/Attributes
        range:
          type: object
        feedbackFormSubmission:
          description: The submission to the feedback form sent along with a rating
            request
          $ref: https://schema.beckn.io/FormSubmission/v2.0/attributes.yaml#/components/schemas/FormSubmission
      required:
      - target
      - range
      additionalProperties: false
