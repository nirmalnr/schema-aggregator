# sources.yaml
# Schema source registry for schema-aggregator (POC).
#
# Each entry declares a GitHub-hosted schema source that the sync workflow
# (.github/workflows/sync.yml) pulls from and flattens into this repo's root
# as <Term>/<Version>/<file>.
#
# Fields:
#   id          : derived automatically (by .github/scripts/propose_source.py)
#                 from the schemaPath's own (owner, repo, ref, subpath) --
#                 owner_repo_ref_subpath, lowercased, '_'-joined. Nobody types
#                 an id: re-proposing the exact same (owner, repo, ref, subpath)
#                 always derives the same id, so it's caught as an ordinary
#                 already-registered rejection rather than silently
#                 registering twice. Including subpath in the derivation is
#                 what keeps two sources from the same repo (different
#                 subpaths) from colliding the way they do in the current
#                 admin app, which derives from repo+ref alone.
#   schemaPath  : GitHub tree URL pointing at the schema folder to pull.
#   description : human-readable summary.
#   tags        : domain tags applied to all schemas from this source.

sources:
  - id: beckn_schemas_main_schema
    schemaPath: "https://github.com/beckn/schemas/tree/main/schema"
    description: ""

  - id: beckn_local-retail_main_schema
    schemaPath: "https://github.com/beckn/local-retail/tree/main/schema"
    description: ""

  - id: beckn_deg_main_specification_schema
    schemaPath: "https://github.com/beckn/DEG/tree/main/specification/schema"
    description: "Schema to support digital energy grid. This also contains some schemas inspired from external standards (espiGreenButton, OpenADR etc.)."
    tags: ["deg", "energy"]

  - id: abhimail_beckn-schemas_main_transport-hiring
    schemaPath: "https://github.com/abhimail/beckn-schemas/tree/main/transport-hiring"
    description: "Extension of hiring schemas to support driver hiring in transport sector"
    tags: ["transport-hiring"]

  - id: abhimail_beckn-schemas_main_verification-service
    schemaPath: "https://github.com/abhimail/beckn-schemas/tree/main/verification-service"
    description: "This schema pack models a Verification Service Network on the Beckn Protocol v2.1 generalised core. It enables discovery, selection, and execution of identity, credential, and eligibility verification services across a decentralized network of verification providers."
    tags: ["verification-service"]

  - id: beckn_ddm_main_specification_schema
    schemaPath: "https://github.com/beckn/DDM/tree/main/specification/schema"
    description: "Decentralized Data Marketplace schema"
    tags: ["data exchange", "data"]

  - id: nirmalnr_schema-test_main_schema
    schemaPath: "https://github.com/nirmalnr/schema-test/tree/main/schema"
    description: "Test fixture source for exercising sync validation (deliberately valid and invalid classes)"
    tags: ["test-fixture"]
