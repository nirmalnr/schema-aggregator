name: Sync sources
run-name: "Sync (${{ inputs.source_id || 'all' }}) by ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: >
          Source to sync. This list is regenerated automatically by
          sources-changed.yml whenever sources.yaml changes on main --
          you shouldn't need to edit it by hand.
        type: choice
        default: 'all'
        # BEGIN generated options
        options:
          - all
          - schemas-main
          - local-retail-main
          - deg-main
          - beckn-schemas-transport-hiring
          - beckn-schemas-verification-service
          - ddm-main
          - schema-test
        # END generated options

permissions:
  contents: write
  issues: write

concurrency:
  group: sync-${{ github.event.inputs.source_id || 'all' }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aggregator repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Pull, validate, and flatten sources
        id: sync
        env:
          SOURCE_ID: ${{ github.event.inputs.source_id || 'all' }}
          VALIDATION_REPORT_PATH: /tmp/validation-report.md
        run: python3 .github/scripts/sync_sources.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "sync: pull schema content (source_id=${{ github.event.inputs.source_id || 'all' }})"
            git push
          fi

      - name: Update validation tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          HAS_FAILURES: ${{ steps.sync.outputs.has_failures }}
          VALIDATION_REPORT_PATH: /tmp/validation-report.md
        run: bash .github/scripts/update_tracking_issue.sh
