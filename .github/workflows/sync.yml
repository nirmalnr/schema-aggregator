name: 3 Sync sources (manual trigger)
run-name: "Sync (${{ inputs.source_id || 'all' }}) by ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      # Free text, not a dropdown of current ids: GITHUB_TOKEN can never
      # push a change to a workflow file, so a dropdown here would just
      # silently drift out of sync with sources.yaml instead of staying
      # current.
      source_id:
        description: >
          Source ID: 'all' to sync every registered source (recommended --
          also cleans up anything left over from a removed source), or the
          exact id of one specific source to sync just that one.
        type: string
        default: 'all'

permissions:
  contents: write
  issues: write

concurrency:
  group: sync-${{ github.event.inputs.source_id || 'all' }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aggregator repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Pull, validate, and flatten sources
        id: sync
        env:
          SOURCE_ID: ${{ github.event.inputs.source_id || 'all' }}
          VALIDATION_REPORT_PATH: /tmp/validation-report.md
        run: python3 .github/scripts/sync_sources.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "sync: pull schema content (source_id=${{ github.event.inputs.source_id || 'all' }})"
            git push
          fi

      - name: Update validation tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          HAS_FAILURES: ${{ steps.sync.outputs.has_failures }}
          VALIDATION_REPORT_PATH: /tmp/validation-report.md
        run: bash .github/scripts/update_tracking_issue.sh
