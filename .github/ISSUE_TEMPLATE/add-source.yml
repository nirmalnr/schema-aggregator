name: Add a schema source
description: Propose registering a new schema source for the aggregator (works without repo write access)
title: "Add source: "
labels: ["add-source-request"]
body:
  - type: markdown
    attributes:
      value: |
        Submitting this opens a PR automatically if the basic details check out
        (this repo/branch/folder isn't already registered, and the schema path
        actually resolves on GitHub). If something's wrong, this issue gets a
        comment explaining what to fix -- no PR is opened until it does. The
        source's id is generated automatically from the schema path; there's
        nothing to type for it.
  - type: input
    id: schema_path
    attributes:
      label: Schema Path
      description: GitHub tree URL pointing at the schema folder
      placeholder: "https://github.com/<owner>/<repo>/tree/<ref>/<subpath>"
    validations:
      required: true
  - type: input
    id: description
    attributes:
      label: Description
      description: Optional human-readable summary
    validations:
      required: false
  - type: input
    id: tags
    attributes:
      label: Tags
      description: Optional, comma-separated
    validations:
      required: false
