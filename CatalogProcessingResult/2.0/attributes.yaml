openapi: 3.1.1
info:
  title: CatalogProcessingResult
  version: 2.0.0
  description: "Container schemas fetched from beckn.yaml. This cannot be extended as it is a reserved schema in beckn protocol. Any additional properties added to this schema can only be made using its *Attributes property"
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    CatalogProcessingResult:
      x-iri: https://schema.beckn.io/CatalogProcessingResult/v2.0
      description: Processing result for a single catalog submission.
      type: object
      required:
      - catalogId
      - status
      properties:
        catalogId:
          type: string
          description: Identifier of the submitted catalog
        status:
          description: 'Processing outcome. Using oneOf [string, object] to allow
            domain-specific

            status objects (e.g. beckn:CatalogAccepted) alongside standard string
            codes.'
          type: string
          enum:
          - ACCEPTED
          - REJECTED
          - PARTIAL
        errors:
          type: array
          description: Per-item or per-catalog errors (present when REJECTED or PARTIAL)
          items:
            $ref: https://schema.beckn.io/Error/v2.0/attributes.yaml#/components/schemas/Error
        stats:
          type: object
          description: Optional statistics about the processed catalog
          properties:
            itemCount:
              type: integer
              description: Number of items accepted
            providerCount:
              type: integer
              description: Number of providers in the catalog
            categoryCount:
              type: integer
              description: Number of distinct categories
