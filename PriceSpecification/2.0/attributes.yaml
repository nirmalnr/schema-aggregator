openapi: 3.1.1
info:
  title: PriceSpecification
  version: 2.0.0
  description: Schema definition for PriceSpecification in the Beckn Protocol
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    PriceSpecification:
      x-iri: https://schema.beckn.io/PriceSpecification/v2.0
      description: Schema definition for PriceSpecification in the Beckn Protocol
      title: PriceSpecification
      type: object
      properties:
        currency:
          type: string
          description: ISO 4217 code
        value:
          type: number
          description: Total value for this price specification
        applicableQuantity:
          $ref: https://schema.beckn.io/Quantity/v2.0/attributes.yaml#/components/schemas/Quantity
          x-jsonld:
            '@id': schema:eligibleQuantity
        components:
          type: array
          description: Optional components (tax, shipping, discount, fee, surcharge)
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                - UNIT
                - TAX
                - DELIVERY
                - DISCOUNT
                - FEE
                - SURCHARGE
              value:
                type: number
              currency:
                type: string
              description:
                type: string
      additionalProperties: true
      x-jsonld:
        '@id': schema:PriceSpecification
