components:
  schemas:
    ErrorCode:
      x-iri: https://schema.beckn.io/ErrorCode/v2.0
      title: ErrorCode
      description: Canonical Beckn Protocol v2 error code enum. The prefix indicates the protocol stack
        layer at which the error originated. Error.code MUST be one of these values. Defined by NFH-008
        (Handling Exceptions and Errors).
      type: string
      enum:
      - CTX_MISSING_FIELD
      - CTX_INVALID_FIELD
      - CTX_ACTION_MISMATCH
      - CTX_VERSION_UNSUPPORTED
      - CTX_TTL_EXPIRED
      - CTX_MESSAGE_ID_DUPLICATE
      - CTX_TRANSACTION_ID_UNKNOWN
      - CTX_CALLBACK_URL_MISSING
      - CTX_INVALID_BPP_URI
      - AUT_SIGNATURE_MISSING
      - AUT_SIGNATURE_INVALID
      - AUT_SUBSCRIBER_NOT_FOUND
      - AUT_KEY_NOT_FOUND
      - AUT_KEY_EXPIRED_OR_REVOKED
      - AUT_UNAUTHORIZED_ACTION
      - AUT_DOMAIN_NOT_ALLOWED
      - AUT_REPLAY_DETECTED
      - AUT_RATE_LIMITED
      - SCH_INVALID_JSON
      - SCH_SCHEMA_VALIDATION_FAILED
      - SCH_REQUIRED_FIELD_MISSING
