openapi: 3.1.1
info:
  title: NackForbidden
  version: 2.0.0
  description: Container schemas fetched from beckn.yaml. This cannot be extended as it is a reserved
    schema in beckn protocol. Any additional properties added to this schema can only be made using its
    *Attributes property
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    NackForbidden:
      x-iri: https://schema.beckn.io/NackForbidden/v2.0
      description: 'The synchronous rejection body returned when the caller is authenticated but does
        not have permission to access or modify the requested resource.


        NackForbidden appears as the response body for 403 responses. The implementing actor produces
        it; the calling actor MUST NOT retry without correcting its authorization.


        Relationship: Extends the Ack schema with status constrained to NACK and adds an error field describing
        the authorization failure.'
      type: object
      required:
      - message
      properties:
        message:
          type: object
          required:
          - status
          - messageId
          - error
          properties:
            status:
              type: string
              const: NACK
            messageId:
              type: string
              description: Echoes the messageId from the triggering request's Context, for caller correlation.
            error:
              $ref: https://schema.beckn.io/Error/v2.0/attributes.yaml#/components/schemas/Error
